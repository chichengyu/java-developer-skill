version: "3.8"
services:
  mysql-test:
    image: mysql:8.0
    container_name: multi-db-analyzer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-testpass123}
      MYSQL_DATABASE: ${MYSQL_DB:-testdb}
      MYSQL_USER: ${MYSQL_USER:-testuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-testpass123}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s; timeout: 5s; retries: 10
  postgres-test:
    image: postgres:16
    container_name: multi-db-analyzer-pg
    environment:
      POSTGRES_DB: ${PG_DB:-testdb}
      POSTGRES_USER: ${PG_USER:-testuser}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-testpass123}
    ports:
      - "${PG_PORT:-5433}:5432"
    volumes:
      - ./pg-init.sql:/docker-entrypoint-initdb.d/pg-init.sql
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s; timeout: 5s; retries: 10
volumes:
  mysql-data:
  pg-data:
