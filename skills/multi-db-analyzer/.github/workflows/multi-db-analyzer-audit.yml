 name: multi-db-analyzer Audit

on:
  pull_request:
    paths:
      - 'src/main/resources/**'
      - '**/schema.sql'
      - '**/data.sql'
  workflow_dispatch:
    inputs:
      db_name:
        description: "数据库名称"
        required: true
        default: "mydb"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Analyze database schema
        env:
          DB_HOST: ${{ secrets.DB_HOST || 'localhost' }}
          DB_PORT: ${{ secrets.DB_PORT || '3306' }}
          DB_NAME: ${{ inputs.db_name || 'mydb' }}
          DB_USER: ${{ secrets.DB_USER || 'root' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          python scripts/database_query.py --db-type mysql --db "$DB_NAME" --get-schema --output schema.json
          python scripts/database_query.py --db-type mysql --db "$DB_NAME" --analyze-all --output analyze_all.json

      - name: Generate audit report
        if: always()
        run: |
          python scripts/skill_bridge.py --db "$DB_NAME" --tables $(python -c "
import json; data=json.load(open('analyze_all.json'));
tables=[t['name'] for t in data.get('analysis',{}).get('tables',[])];
print(' '.join(tables[:10]))") --audit-format markdown --output audit_report

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: |
            schema.json
            analyze_all.json
            audit_report.*

      - name: Comment PR with audit summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit_report.md', 'utf8').slice(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 数据库审计报告\n\n' + report
            });
