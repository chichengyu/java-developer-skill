name: Java Superpowers Audit

on:
  pull_request:
    paths: ["*.java", "*.xml", "*.sql", "application-*.yml"]
  push:
    branches: [main, master, develop]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Auto-detect and compile Java project
        id: compile
        run: |
          if [ -f "pom.xml" ]; then
            echo "build_tool=maven" >> $GITHUB_OUTPUT
            mvn compile -q -Dmaven.test.skip=true
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            echo "build_tool=gradle" >> $GITHUB_OUTPUT
            gradle compileJava -q
          else
            echo "build_tool=none" >> $GITHUB_OUTPUT
            echo "No Maven/Gradle project detected, skipping compilation"
          fi

      - name: Run JUnit tests
        if: steps.compile.outputs.build_tool != 'none'
        run: |
          if [ "${{ steps.compile.outputs.build_tool }}" = "maven" ]; then
            mvn test -q
          else
            gradle test -q
          fi

      - name: Check commit messages
        run: |
          python scripts/cicd_helper.py --check-commit-msg "${{ github.event.head_commit.message }}"

      - name: Generate audit report
        if: always()
        run: |
          python scripts/audit_report_generator.py --format markdown --output reports/audit.md

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: |
            target/surefire-reports/**
            build/reports/tests/**
            reports/**
          if-no-files-found: ignore
